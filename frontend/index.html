<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CineAI — Movie Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0f;
  --surface:   #111118;
  --card:      #16161f;
  --border:    rgba(255,255,255,0.07);
  --accent:    #e50914;
  --accent2:   #ff6b35;
  --gold:      #f5c518;
  --text:      #e8e8ee;
  --muted:     #6b6b7a;
  --green:     #21c55d;
  --red:       #ef4444;
  --radius:    12px;
  --glow:      0 0 40px rgba(229,9,20,0.15);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Grain Overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── Hero Header ── */
header {
  position: relative;
  padding: 28px 48px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(229,9,20,0.5);
  user-select: none;
}
.logo span { color: var(--text); }

.header-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ── Hero Section ── */
.hero {
  position: relative;
  text-align: center;
  padding: 80px 24px 60px;
  z-index: 2;
  overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% -10%, rgba(229,9,20,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 8vw, 6rem);
  letter-spacing: 6px;
  line-height: 1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.4));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  color: var(--muted);
  font-size: 1.05rem;
  font-weight: 300;
  letter-spacing: 0.5px;
  margin-bottom: 44px;
}

/* ── Search Bar ── */
.search-wrap {
  position: relative;
  max-width: 620px;
  margin: 0 auto;
  display: flex;
  gap: 0;
  filter: drop-shadow(0 8px 32px rgba(229,9,20,0.2));
}

#searchInput {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-right: none;
  border-radius: var(--radius) 0 0 var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 1.05rem;
  font-weight: 400;
  padding: 16px 22px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  backdrop-filter: blur(10px);
}

#searchInput::placeholder { color: var(--muted); }
#searchInput:focus {
  border-color: rgba(229,9,20,0.5);
  background: rgba(255,255,255,0.07);
}

#searchBtn {
  background: var(--accent);
  border: none;
  border-radius: 0 var(--radius) var(--radius) 0;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 16px 28px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}
#searchBtn:hover { background: #ff1a24; }
#searchBtn:active { transform: scale(0.98); }

/* ── Status messages ── */
#status {
  text-align: center;
  margin-top: 20px;
  min-height: 24px;
  font-size: 0.9rem;
  color: var(--muted);
}

.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Main Results ── */
#results {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 80px;
  z-index: 2;
  position: relative;
}

/* ── Section label ── */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Movie Detail Card ── */
.movie-detail {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 40px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}

.movie-detail::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.movie-title-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  letter-spacing: 2px;
  line-height: 1.1;
  margin-bottom: 14px;
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  align-items: center;
}

.tag {
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  transition: background 0.2s;
}

.tag.year { color: var(--gold); border-color: rgba(245,197,24,0.25); background: rgba(245,197,24,0.08); }
.tag.lang { color: #7dd3fc; border-color: rgba(125,211,252,0.2); background: rgba(125,211,252,0.07); }

.overview-text {
  color: rgba(232,232,238,0.8);
  line-height: 1.75;
  font-size: 0.97rem;
  font-weight: 300;
  max-width: 760px;
}

/* ── Verdict Card ── */
.verdict-card {
  border-radius: 16px;
  padding: 32px 40px;
  margin-bottom: 32px;
  display: flex;
  align-items: flex-start;
  gap: 32px;
  animation: fadeUp 0.5s 0.1s ease both;
  opacity: 0;
  position: relative;
  overflow: hidden;
}

.verdict-card.worth {
  background: linear-gradient(135deg, rgba(33,197,93,0.1) 0%, rgba(33,197,93,0.04) 100%);
  border: 1px solid rgba(33,197,93,0.25);
}
.verdict-card.decent {
  background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0.04) 100%);
  border: 1px solid rgba(59,130,246,0.25);
}
.verdict-card.skip {
  background: linear-gradient(135deg, rgba(239,68,68,0.1) 0%, rgba(239,68,68,0.04) 100%);
  border: 1px solid rgba(239,68,68,0.25);
}

.verdict-icon {
  font-size: 3.5rem;
  line-height: 1;
  flex-shrink: 0;
}

.verdict-main { flex: 1; }

.verdict-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.verdict-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 3px;
  line-height: 1;
  margin-bottom: 10px;
}
.verdict-card.worth .verdict-text { color: var(--green); }
.verdict-card.decent .verdict-text { color: #3b82f6; }
.verdict-card.skip  .verdict-text { color: var(--red); }

.verdict-reason {
  color: rgba(232,232,238,0.7);
  font-size: 0.9rem;
  font-weight: 300;
  line-height: 1.6;
  max-width: 520px;
}

/* Score bar */
.score-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.score-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  line-height: 1;
  letter-spacing: 2px;
}
.verdict-card.worth .score-number { color: var(--green); }
.verdict-card.decent .score-number { color: #3b82f6; }
.verdict-card.skip  .score-number { color: var(--red); }

.score-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.score-dots {
  display: flex;
  gap: 5px;
  margin-top: 4px;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.dot.filled.worth { background: var(--green); box-shadow: 0 0 8px rgba(33,197,93,0.5); }
.dot.filled.decent { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.5); }
.dot.filled.skip  { background: var(--red);   box-shadow: 0 0 8px rgba(239,68,68,0.5); }

/* ── Recommendations ── */
.rec-section {
  animation: fadeUp 0.5s 0.2s ease both;
  opacity: 0;
}

.rec-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.rec-scroll::-webkit-scrollbar { height: 4px; }
.rec-scroll::-webkit-scrollbar-track { background: transparent; }
.rec-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.rec-card {
  flex-shrink: 0;
  width: 200px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  scroll-snap-align: start;
  cursor: default;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.rec-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}

.rec-card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: rgba(229,9,20,0.3);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px rgba(229,9,20,0.08);
}
.rec-card:hover::before { opacity: 1; }

.rec-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  color: rgba(255,255,255,0.04);
  line-height: 1;
  margin-bottom: -8px;
}

.rec-title {
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 10px;
  color: var(--text);
}

.rec-genres {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 10px;
}

.rec-sim {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--accent2);
  letter-spacing: 1px;
}

.rec-year {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ── Error state ── */
.error-msg {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--radius);
  padding: 16px 22px;
  color: #fca5a5;
  font-size: 0.9rem;
  text-align: center;
  animation: fadeUp 0.3s ease both;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0;
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 24px;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.78rem;
  letter-spacing: 1px;
  z-index: 2;
  position: relative;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  header { padding: 20px 20px; }
  .hero { padding: 50px 20px 40px; }
  #results { padding: 0 16px 60px; }
  .movie-detail, .verdict-card { padding: 24px 20px; }
  .verdict-card { flex-direction: column; gap: 20px; }
  .score-display { flex-direction: row; align-items: center; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Cine<span>AI</span></div>
  <div class="header-tag">Movie Intelligence v1.0</div>
</header>

<!-- ── Hero ── -->
<section class="hero">
  <div class="hero-bg"></div>
  <h1>DISCOVER YOUR<br><em>NEXT FILM</em></h1>
  <p>AI-powered search, verdict &amp; smart recommendations</p>

  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search a movie title…" autocomplete="off" spellcheck="false" />
    <button id="searchBtn">Analyse</button>
  </div>

  <div id="status"></div>
</section>

<!-- ── Results ── -->
<section id="results"></section>

<footer>
  CineAI &nbsp;·&nbsp; Powered by FastAPI + TF-IDF &nbsp;·&nbsp; Dark theme &copy; 2025
</footer>

<script>
const API = "https://cineai-backend-4akl.onrender.com";
const searchInput = document.getElementById('searchInput');
const searchBtn   = document.getElementById('searchBtn');
const statusEl    = document.getElementById('status');
const resultsEl   = document.getElementById('results');

// ── Helpers ────────────────────────────────────────────

function setStatus(msg, isLoading = false) {
  statusEl.innerHTML = isLoading
    ? `<span class="spinner"></span>${msg}`
    : `<span>${msg}</span>`;
}

function clearStatus() { statusEl.innerHTML = ''; }

function showError(msg) {
  resultsEl.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
}

// ── Fetch wrappers ──────────────────────────────────────

async function apiGet(endpoint, params) {
  const url = new URL(API + endpoint);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url, { mode: 'cors' });
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    const msg = data && data.error ? data.error : `HTTP ${res.status}`;
    throw new Error(msg);
  }
  if (!data) {
    throw new Error('Server returned invalid JSON');
  }
  return data;
}

// ── Render helpers ──────────────────────────────────────

function renderGenreTags(genres) {
  if (!genres || !genres.length) return '';
  return genres.map(g => `<span class="tag">${g}</span>`).join('');
}

function renderMovieDetail(data) {
  return `
    <div class="section-label">Movie Details</div>
    <div class="movie-detail">
      <div class="movie-title-big">${escHtml(data.title)}</div>
      <div class="meta-row">
        ${data.release_year ? `<span class="tag year">📅 ${data.release_year}</span>` : ''}
        ${data.language && data.language !== 'Unknown' ? `<span class="tag lang">🌐 ${escHtml(data.language)}</span>` : ''}
        ${renderGenreTags(data.genres)}
      </div>
      <p class="overview-text">${escHtml(data.overview)}</p>
    </div>`;
}

function renderVerdict(data) {
  const isWorth = data.verdict.includes('Worth Watching');
  const isDecent = data.verdict.includes('Decent');
  const cls = isWorth ? 'worth' : isDecent ? 'decent' : 'skip';
  const icon = isWorth ? '🔥' : isDecent ? '👍' : '❌';
  const dots = [1,2,3,4,5].map(i =>
    `<div class="dot ${i <= data.score ? 'filled ' + cls : ''}"></div>`
  ).join('');

  return `
    <div class="section-label">AI Verdict</div>
    <div class="verdict-card ${cls}">
      <div class="verdict-icon">${icon}</div>
      <div class="verdict-main">
        <div class="verdict-label">Our Recommendation</div>
        <div class="verdict-text">${escHtml(data.verdict)}</div>
        <p class="verdict-reason">${escHtml(data.confidence_reason)}</p>
      </div>
      <div class="score-display">
        <div class="score-number">${data.score}/5</div>
        <div class="score-label">Rating</div>
        <div class="score-dots">${dots}</div>
      </div>
    </div>`;
}

function renderRecommendations(recs) {
  if (!recs || !recs.length) return '';

  const cards = recs.map((r, i) => `
    <div class="rec-card">
      <div class="rec-number">0${i+1}</div>
      <div class="rec-title">${escHtml(r.title)}</div>
      <div class="rec-genres">${r.genres && r.genres.length ? r.genres.slice(0,3).join(' · ') : '—'}</div>
      ${r.release_year ? `<div class="rec-year">${r.release_year}</div>` : ''}
      <div class="rec-sim">↗ ${Math.round(r.similarity_score * 100)}% match</div>
    </div>`).join('');

  return `
    <div class="rec-section">
      <div class="section-label">Similar Films You Might Enjoy</div>
      <div class="rec-scroll">${cards}</div>
    </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Main search flow ────────────────────────────────────

async function runSearch() {
  const title = searchInput.value.trim();
  if (!title) {
    searchInput.focus();
    return;
  }

  resultsEl.innerHTML = '';
  setStatus('Fetching movie data…', true);
  searchBtn.disabled = true;

  try {
    // Parallel fetch: search + recommend + verdict
    setStatus('Analysing film…', true);
    const [searchRes, recRes, verdictRes] = await Promise.all([
      apiGet('/search',    { title }),
      apiGet('/recommend', { title }),
      apiGet('/verdict',   { title }),
    ]);

    // Check for errors
    if (searchRes.error) {
      showError(`${searchRes.error}. Available movies: ${searchRes.available_movies.slice(0,5).join(', ')}...`);
      return;
    }
    if (recRes.error) {
      showError(`${recRes.error}. Available movies: ${recRes.available_movies.slice(0,5).join(', ')}...`);
      return;
    }
    if (verdictRes.error) {
      showError(`${verdictRes.error}. Available movies: ${verdictRes.available_movies.slice(0,5).join(', ')}...`);
      return;
    }

    clearStatus();
    resultsEl.innerHTML =
      renderMovieDetail(searchRes.data) +
      '<div class="divider"></div>' +
      renderVerdict(verdictRes) +
      '<div class="divider"></div>' +
      renderRecommendations(recRes.recommendations);

    // Scroll to results
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    clearStatus();
    showError('Network error: ' + err.message);
  } finally {
    searchBtn.disabled = false;
  }
}

// ── Events ─────────────────────────────────────────────

searchBtn.addEventListener('click', runSearch);
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') runSearch();
});

// Auto-focus search
searchInput.focus();
</script>
</body>
</html>
